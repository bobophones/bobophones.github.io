<!DOCTYPE html>
<html lang="ru">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" href="style.css">
	<script src="script.js"></script>

	<title>Таблица с динамическим добавлением строк</title>
</head>

<body>
	<div class="container">

		<form id="addRowForm">
			<input type="text" id="name" placeholder="Имя" required><br><br>
			<input type="number" id="age" placeholder="Возраст" required><br><br>
			<input type="text" id="city" placeholder="Город" required><br><br>
			<button type="button" onclick="addRow()">Добавить строку</button>
		</form>

		<h1> таблица </h1>

		<table id="userTable">
			<thead>
				<tr>
					<th>Имя</th>
					<th>Возраст</th>
					<th>Город</th>
					<th>Действия</th>
				</tr>
			</thead>
			<tbody>
				<tr>
					<td>Иван</td>
					<td>25</td>
					<td>Москва</td>
					<td>
						<button onclick="editRow(this)">Редактировать</button>
						<button onclick="deleteRow(this)">Удалить</button>
					</td>
				</tr>
			</tbody>
		</table>
	</div>
</body>

</html>
